<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Do you love me? ❤️</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ff9ec4,#ffd6e7);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.box{
background:white;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,.2);
}

h1{
color:#ff2d75;
}

button{
padding:12px 25px;
font-size:18px;
margin:10px;
border:none;
border-radius:12px;
cursor:pointer;
}

#yes{
background:#ff2d75;
color:white;
}

#no{
background:#ddd;
position:absolute;
}

#second{
display:none;
}

.gift{
margin:10px;
padding:12px;
background:#ffb3d1;
border-radius:10px;
cursor:pointer;
}

img{
width:220px;
border-radius:15px;
margin-top:15px;
display:none;
}
</style>

</head>
<body>

<div class="box" id="first">
<h1>Do you love me? ❤️</h1>

<button id="yes">YES</button>
<button id="no">NO</button>
</div>

<div class="box" id="second">

<h2>I knew you'd say yes 💕</h2>

<div class="gift" onclick="alert('Nothing 😅')">
🎁 Gift 1
</div>

<div class="gift" onclick="alert('Once Again - Mad Clown & Kim Na Young 🎵')">
🎁 Gift 2
</div>
<h2>🎵 A Song That Reminds Me of Us</h2>

<iframe
    <h2>🎵 A Song That Reminds Me of Us</h2>

<div style=.music-card{
    background:#ffd6e7;
    padding:20px;
    border-radius:20px;
    display:flex;
    gap:20px;
    align-items:center;
    justify-content:center;
    max-width:700px;
    margin:auto;
}

.disc{
    font-size:90px;
}

.video-box{
    flex:1;
}

.video-box iframe{
    width:100%;
    height:220px;
    border-radius:15px;
}

.video-box button{
    margin-top:15px;
    width:100%;
    padding:15px;
    background:#ff7fb3;
    color:white;
    border:none;
    border-radius:15px;
    font-size:20px;
    cursor:pointer;
}

    <iframe
        <h2>🎵 A Song That Reminds Me of Us</h2>

<div class="music-card">

  <div class="disc">💿</div>

  <div class="video-box">
    <iframe
      src="https://www.youtube.com/embed/6oCL9a9mZoU"
      title="YouTube video"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen>
    </iframe>

    <button onclick="window.open('https://youtu.be/6oCL9a9mZoU','_blank')">
      ▶ Play
    </button>
  </div>

</div>
    
</iframe>
<div class="gift" onclick="showGift()">
🎁 Gift 3
</div>
<img id="photo" src="https://i.postimg.cc/prs57v9z/IMG-0416.jpg">


<h2 id="text" style="display:none;color:#ff2d75;">
💝 You are my best gift 💝
</h2>

</div>

<script>

const no=document.getElementById("no");

no.addEventListener("mouseover",()=>{

no.style.left=Math.random()*80+"%";
no.style.top=Math.random()*80+"%";

});

document.getElementById("yes").onclick=()=>{

document.getElementById("first").style.display="none";

document.getElementById("second").style.display="block";

}

function showGift(){

document.getElementById("photo").style.display="block";

document.getElementById("text").style.display="block";

}

</script>

</body>
</html>
